site_name: inferlite
site_description: 从零手撕的 LLM 推理引擎学习项目 · L0-aligned with transformers
site_url: https://luhao-lab.github.io/inferlite/
repo_url: https://github.com/luhao-lab/inferlite
repo_name: luhao-lab/inferlite
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - announce.dismiss
  palette:
    # 默认深色（极客风首选）
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark
  icon:
    repo: fontawesome/brands/github
    logo: octicons/cpu-16
    edit: material/pencil
    view: material/eye
    annotation: material/plus-circle
    admonition:
      note: octicons/info-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/light-bulb-16
      success: octicons/check-circle-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - _assets/stylesheets/extra.css

extra_javascript:
  - _assets/javascripts/extra.js

nav:
  - 首页: README.md
  - 规划:
      - 路线图 PLAN: plan/PLAN.md
      - 进度 PROGRESS: plan/PROGRESS.md
      - M1 作战地图: plan/M1.md
      - M2 KV Cache 设计: plan/m2-kv-cache-design.md
  - 任务卡 (M2 活跃):
      - M2-T1 KVCache: tasks/M2-T1-KVCache-DataStructure.md
      - M2-T2 Attention KV: tasks/M2-T2-Attention-KVCache.md
      - M2-T3 Model 透传: tasks/M2-T3-Model-Passthrough.md
      - M2-T4 Generate Loop: tasks/M2-T4-Generate-Loop.md
      - M2-T5 CLI 设备: tasks/M2-T5-CLI-Device-Dtype.md
  - 任务卡 (M1 归档):
      - T0 ModelConfig: tasks/M1-archive/M1-T0-ModelConfig.md
      - T1 RMSNorm: tasks/M1-archive/M1-T1-RMSNorm.md
      - T2 SwiGLU: tasks/M1-archive/M1-T2-SwiGLU.md
      - T3 RoPE: tasks/M1-archive/M1-T3-RoPE.md
      - T4 GQA Attention: tasks/M1-archive/M1-T4-GQA-Attention.md
      - T5 DecoderLayer: tasks/M1-archive/M1-T5-DecoderLayer.md
      - T6 Qwen3Model: tasks/M1-archive/M1-T6-Qwen3Model.md
      - T7 WeightLoader: tasks/M1-archive/M1-T7-WeightMap-load-from-hf.md
      - T8 Logits 对齐: tasks/M1-archive/M1-T8-L1-logits-alignment.md
      - T9 LLMModel+Sampler: tasks/M1-archive/M1-T9-LLMModel-GreedySampler.md
      - T10 EngineCore: tasks/M1-archive/M1-T10-EngineCore-step.md
      - T11 CLI e2e: tasks/M1-archive/M1-T11-CLI-L2-e2e.md
      - T12 smoke test: tasks/M1-archive/M1-T12-smoke-test.md
  - 知识库:
      - knowledge: kb/knowledge.md
      - lessons: kb/lessons.md
      - blueprints: kb/blueprints.md
  - 环境: setup.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - md_in_html
  - toc:
      permalink: "#"
      permalink_title: 锚点
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.betterem
  - pymdownx.magiclink

plugins:
  - search:
      lang:
        - zh
        - en
  - mermaid2:
      version: 11.4.0

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/luhao-lab/inferlite
  status:
    new: 新增
    deprecated: 已废弃
  generator: false

copyright: >
  Copyright &copy; 2026 luhao &mdash; MIT &mdash;
  Built with <a href="https://squidfunk.github.io/mkdocs-material/">Material for MkDocs</a>
